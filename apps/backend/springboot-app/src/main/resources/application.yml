spring:
  application:
    name: backend-springboot
  datasource:
    # Injected from the K8s Secret rendered by the ExternalSecret
    # (gitops/apps/backend-springboot/externalsecret.yaml <- OCI Vault).
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # ATP Always Free allows few concurrent sessions; stay small.
      maximum-pool-size: 5
      minimum-idle: 1
      # Start even when the DB is unreachable; /api/status reports DOWN
      # instead of the pod crash-looping.
      initialization-fail-timeout: -1
  flyway:
    # Disabled by default so the app boots without a reachable database.
    # Tests enable it via application-test.yml (H2). Production must enable it
    # explicitly (env SPRING_FLYWAY_ENABLED=true in the deployment) once
    # tracker migrations ship — it does NOT auto-enable.
    enabled: false

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # /actuator/health/liveness + /readiness for the K8s probes.
      probes:
        enabled: true

# --- Gated résumé -----------------------------------------------------------
# Ships LOCKED: with no code-hashes, the verifier accepts nothing. Add
# sha256 hex digests (comma-separated) and a real signing secret via
# env/Vault to open it. Codes are never stored in plaintext.
resume:
  access:
    signing-secret: ${RESUME_SIGNING_SECRET:change-me-dev-secret}
    code-hashes: ${RESUME_CODE_HASHES:}
    ttl-minutes: ${RESUME_TTL_MINUTES:15}

# --- News feed --------------------------------------------------------------
# Empty feeds = no ingestion (safe to deploy before feed egress is set up).
# Configure as comma-separated "source|url" pairs or bare feed URLs (the
# source label then defaults to the URL's host), e.g.
#   NEWS_FEEDS="Google Tech|https://news.google.com/rss/search?q=kubernetes"
# In-cluster this also needs a backend CNP egress rule to the feed hosts.
news:
  feeds: ${NEWS_FEEDS:}
  refresh-cron: ${NEWS_REFRESH_CRON:0 0 * * * *}

# --- Anthropic (Claude) summarizer -------------------------------------------
# Empty key = summarization disabled (DisabledSummarizer); articles keep the
# source excerpt. The key comes from OCI Vault via the ExternalSecret
# (gitops/apps/backend-springboot/externalsecret.yaml). In-cluster the call
# also needs the backend CNP egress rule to api.anthropic.com:443.
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-opus-4-8}

# --- Multiplanetary tracker -------------------------------------------------
tracker:
  enabled: ${TRACKER_ENABLED:false}
  feeds: ${TRACKER_FEEDS:}
  # Phase 4 Monte Carlo projection is local-only but remains independently dark.
  # When enabled it stores summary quantiles only; no samples or network calls.
  phase4-projection-enabled: ${TRACKER_PHASE4_PROJECTION_ENABLED:false}
  # WP4.4 historical backtesting is local and deterministic, but intentionally
  # expensive. It stays dark until explicitly run and performs no network call.
  phase4-backtest-enabled: ${TRACKER_PHASE4_BACKTEST_ENABLED:false}
  # WP4.5 micro-predictions are deterministic and network-free. Automatic
  # issuance and due-date resolution remain independently dark; token-gated
  # admin operations are available only while the tracker itself is enabled.
  phase4-prediction-issuance-enabled: ${TRACKER_PHASE4_PREDICTION_ISSUANCE_ENABLED:false}
  phase4-prediction-resolution-enabled: ${TRACKER_PHASE4_PREDICTION_RESOLUTION_ENABLED:false}
  phase4-prediction-issuance-cron: ${TRACKER_PHASE4_PREDICTION_ISSUANCE_CRON:0 45 1 * * MON}
  phase4-prediction-resolution-cron: ${TRACKER_PHASE4_PREDICTION_RESOLUTION_CRON:0 15 2 * * *}
  # Launch Library 2 remains independently dark until GitOps egress review.
  # It imports only the previous completed year's Layer B cadence metrics;
  # it never promotes launches into Layer C capability events.
  ll2-enabled: ${TRACKER_LL2_ENABLED:false}
  ll2-cron: ${TRACKER_LL2_CRON:0 17 3 8 * *}
  ll2-max-pages: ${TRACKER_LL2_MAX_PAGES:10}
  # Reviewed worldwide orbital-population transitions are bundled locally.
  # Completed years only become Pillar 2 Layer B measurements; no event,
  # readiness, ETA, network call, or model invocation is involved.
  human-presence-on-boot: ${TRACKER_HUMAN_PRESENCE_ON_BOOT:true}
  human-presence-resource: ${TRACKER_HUMAN_PRESENCE_RESOURCE:tracker/human-presence-transitions-v1.csv}
  human-presence-dataset-version: ${TRACKER_HUMAN_PRESENCE_DATASET_VERSION:human-presence-v1}
  # WP3.5 non-RSS discovery stays independently dark. When enabled it fetches
  # only three fixed official indexes and stores evaluation-quarantined metadata.
  official-index-enabled: ${TRACKER_OFFICIAL_INDEX_ENABLED:false}
  official-index-cron: ${TRACKER_OFFICIAL_INDEX_CRON:0 23 4 * * WED}
  official-index-max-links: ${TRACKER_OFFICIAL_INDEX_MAX_LINKS:40}
  # Declared-assumption transport projections remain dark unless explicitly
  # enabled. They use reviewed local inputs and perform no LLM or network call.
  transport-economics-enabled: ${TRACKER_TRANSPORT_ECONOMICS_ENABLED:false}
  transport-projection-cron: ${TRACKER_TRANSPORT_PROJECTION_CRON:0 47 3 8 * *}
  coherence-cron: ${TRACKER_COHERENCE_CRON:0 0 3 1 */3 *}
  transport-target-usd-per-kg: ${TRACKER_TRANSPORT_TARGET_USD_PER_KG:200}
  transport-target-easy-usd-per-kg: ${TRACKER_TRANSPORT_TARGET_EASY_USD_PER_KG:500}
  transport-target-hard-usd-per-kg: ${TRACKER_TRANSPORT_TARGET_HARD_USD_PER_KG:100}
  # Reviewed annual world-energy observations are bundled locally. Importing
  # them performs no network call and has no automatic readiness/ETA effect.
  k-index-on-boot: ${TRACKER_K_INDEX_ON_BOOT:true}
  k-index-resource: ${TRACKER_K_INDEX_RESOURCE:tracker/k-index-energy-v1.csv}
  k-index-dataset-version: ${TRACKER_K_INDEX_DATASET_VERSION:k-index-energy-v1}
  # Human-reviewed P6 reference facts are bundled locally and never score a node.
  governance-on-boot: ${TRACKER_GOVERNANCE_ON_BOOT:true}
  governance-resource: ${TRACKER_GOVERNANCE_RESOURCE:tracker/governance-ledger-v1.json}
  governance-dataset-version: ${TRACKER_GOVERNANCE_DATASET_VERSION:governance-ledger-v1}
  # WP3.4 target definitions are reviewed reference metadata. Crowd values are
  # deliberately absent until the separate Metaculus authorization gate opens.
  forecast-reference-on-boot: ${TRACKER_FORECAST_REFERENCE_ON_BOOT:true}
  forecast-reference-resource: ${TRACKER_FORECAST_REFERENCE_RESOURCE:tracker/forecast-reference-v1.json}
  forecast-reference-dataset-version: ${TRACKER_FORECAST_REFERENCE_DATASET_VERSION:forecast-reference-v1}
  # All current Metaculus API requests require authentication and data-use
  # authorization. Both gates ship false; the token may only come from Vault.
  metaculus-enabled: ${TRACKER_METACULUS_ENABLED:false}
  metaculus-terms-approved: ${TRACKER_METACULUS_TERMS_APPROVED:false}
  metaculus-token: ${TRACKER_METACULUS_TOKEN:}
  metaculus-cron: ${TRACKER_METACULUS_CRON:0 17 5 * * MON}
  metaculus-max-posts: ${TRACKER_METACULUS_MAX_POSTS:2}
  # Weekly live golden evaluation remains dark until both this explicit
  # GitOps flag and the Vault-injected Anthropic key are present.
  golden-live-enabled: ${TRACKER_GOLDEN_LIVE_ENABLED:false}
  golden-cron: ${TRACKER_GOLDEN_CRON:0 0 2 * * SUN}
  golden-dataset-version: ${TRACKER_GOLDEN_DATASET_VERSION:golden-v1}
  golden-prompt-version: ${TRACKER_GOLDEN_PROMPT_VERSION:classify-prompt-v1}
  golden-model-version: ${TRACKER_GOLDEN_MODEL_VERSION:${TRACKER_CLASSIFY_MODEL:claude-opus-4-8}}
  golden-rubric-version: ${TRACKER_GOLDEN_RUBRIC_VERSION:r2.0}
  golden-schema-version: ${TRACKER_GOLDEN_SCHEMA_VERSION:golden-output-v1}
  cost-per-mtok:
    # Conservative Opus-class defaults. Externalized because provider prices change.
    input: ${TRACKER_COST_INPUT_PER_MTOK:15}
    output: ${TRACKER_COST_OUTPUT_PER_MTOK:75}
    cached-input: ${TRACKER_COST_CACHED_INPUT_PER_MTOK:1.5}

spring:
  application:
    name: backend-springboot
  datasource:
    # Injected from the K8s Secret rendered by the ExternalSecret
    # (gitops/apps/backend-springboot/externalsecret.yaml <- OCI Vault).
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      # ATP Always Free allows few concurrent sessions; stay small.
      maximum-pool-size: 5
      minimum-idle: 1
      # Start even when the DB is unreachable; /api/status reports DOWN
      # instead of the pod crash-looping.
      initialization-fail-timeout: -1
  flyway:
    # Disabled by default so the app boots without a reachable database.
    # Tests enable it via application-test.yml (H2). Production must enable it
    # explicitly (env SPRING_FLYWAY_ENABLED=true in the deployment) once
    # tracker migrations ship — it does NOT auto-enable.
    enabled: false

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # /actuator/health/liveness + /readiness for the K8s probes.
      probes:
        enabled: true

# --- Gated résumé -----------------------------------------------------------
# Ships LOCKED: with no code-hashes, the verifier accepts nothing. Add
# sha256 hex digests (comma-separated) and a real signing secret via
# env/Vault to open it. Codes are never stored in plaintext.
resume:
  access:
    signing-secret: ${RESUME_SIGNING_SECRET:change-me-dev-secret}
    code-hashes: ${RESUME_CODE_HASHES:}
    ttl-minutes: ${RESUME_TTL_MINUTES:15}

# --- News feed --------------------------------------------------------------
# Empty feeds = no ingestion (safe to deploy before feed egress is set up).
# Configure as comma-separated "source|url" pairs or bare feed URLs (the
# source label then defaults to the URL's host), e.g.
#   NEWS_FEEDS="Google Tech|https://news.google.com/rss/search?q=kubernetes"
# In-cluster this also needs a backend CNP egress rule to the feed hosts.
news:
  feeds: ${NEWS_FEEDS:}
  refresh-cron: ${NEWS_REFRESH_CRON:0 0 * * * *}

# --- Anthropic (Claude) summarizer -------------------------------------------
# Empty key = summarization disabled (DisabledSummarizer); articles keep the
# source excerpt. The key comes from OCI Vault via the ExternalSecret
# (gitops/apps/backend-springboot/externalsecret.yaml). In-cluster the call
# also needs the backend CNP egress rule to api.anthropic.com:443.
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-opus-4-8}

# --- Multiplanetary tracker -------------------------------------------------
tracker:
  enabled: ${TRACKER_ENABLED:false}
  feeds: ${TRACKER_FEEDS:}
  # Launch Library 2 remains independently dark until GitOps egress review.
  # It imports only the previous completed year's Layer B cadence metrics;
  # it never promotes launches into Layer C capability events.
  ll2-enabled: ${TRACKER_LL2_ENABLED:false}
  ll2-cron: ${TRACKER_LL2_CRON:0 17 3 8 * *}
  ll2-max-pages: ${TRACKER_LL2_MAX_PAGES:10}
  # Weekly live golden evaluation remains dark until both this explicit
  # GitOps flag and the Vault-injected Anthropic key are present.
  golden-live-enabled: ${TRACKER_GOLDEN_LIVE_ENABLED:false}
  golden-cron: ${TRACKER_GOLDEN_CRON:0 0 2 * * SUN}
  golden-dataset-version: ${TRACKER_GOLDEN_DATASET_VERSION:golden-v1}
  golden-prompt-version: ${TRACKER_GOLDEN_PROMPT_VERSION:classify-prompt-v1}
  golden-model-version: ${TRACKER_GOLDEN_MODEL_VERSION:${TRACKER_CLASSIFY_MODEL:claude-opus-4-8}}
  golden-rubric-version: ${TRACKER_GOLDEN_RUBRIC_VERSION:r2.0}
  golden-schema-version: ${TRACKER_GOLDEN_SCHEMA_VERSION:golden-output-v1}
  cost-per-mtok:
    # Conservative Opus-class defaults. Externalized because provider prices change.
    input: ${TRACKER_COST_INPUT_PER_MTOK:15}
    output: ${TRACKER_COST_OUTPUT_PER_MTOK:75}
    cached-input: ${TRACKER_COST_CACHED_INPUT_PER_MTOK:1.5}

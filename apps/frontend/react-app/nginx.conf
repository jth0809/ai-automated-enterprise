# Served by nginxinc/nginx-unprivileged (listens on 8080, runs as UID 101).
# Replaces the image's /etc/nginx/conf.d/default.conf.

# No nginx version in Server headers / error pages.
server_tokens off;

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (resolves ZAP baseline issue #3) ----------------
    # nginx inheritance rule: any block that declares its own add_header
    # drops ALL inherited ones — /assets/ below repeats this exact list.
    # Keep both copies in sync.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # script-src has no 'unsafe-inline': the Vite build emits only external
    # module scripts. style attrs need 'unsafe-inline'; Vite may inline
    # small assets (fonts/images) as data: URIs.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://api.ai-auto.kro.kr; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    # ----------------------------------------------------------------------

    # SPA routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API proxy to the backend Service. This is the exact flow
    # allowed by the frontend CiliumNetworkPolicy (egress only to backend).
    # The Service ClusterIP is resolved at nginx startup and is stable for
    # the Service's lifetime; the pod crash-restarts (and self-heals) if
    # the backend Service does not exist yet.
    location /api/ {
        proxy_pass http://backend-springboot.backend.svc.cluster.local:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets are immutable. Declaring add_header here suppresses
    # the inherited server-level set (see note above), so the security
    # headers are repeated — ZAP flags /assets/* URLs individually.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://api.ai-auto.kro.kr; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    }
}

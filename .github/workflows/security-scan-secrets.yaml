---
# DevSecOps gate: secret leakage scanning over the full git history.
# "Secrets are never stored in Git" (ARCHITECTURE_PLAN core principle) —
# this makes the principle machine-enforced instead of aspirational.
name: Security - Secret Scan (Gitleaks)

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks full-history scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: flagger-controller
  namespace: flagger-system
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: flagger
      app.kubernetes.io/instance: flagger
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
            prometheus: kube-prometheus-stack-prometheus
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "15008"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
            prometheus: kube-prometheus-stack-prometheus
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
            - port: "15008"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flagger-system
            app: loadtester
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "15008"
              protocol: TCP
    - toFQDNs:
        - matchName: discord.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: flagger-loadtester
  namespace: flagger-system
spec:
  endpointSelector:
    matchLabels:
      app: loadtester
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flagger-system
            app.kubernetes.io/name: flagger
            app.kubernetes.io/instance: flagger
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "15008"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: api.ai-auto.kro.kr
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: external-secrets
  targetNamespace: external-secrets
  chart:
    spec:
      chart: external-secrets
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    # CRDs (SecretStore, ClusterSecretStore, ExternalSecret, ...) are required
    # before the OCI Vault ClusterSecretStore is applied in gitops/security/.
    installCRDs: true
    replicaCount: 1
    concurrent: 1
    # OCI Vault integration: the operator authenticates to OCI via a Secret
    # (API key) or Workload Identity referenced by the ClusterSecretStore
    # defined in gitops/security/external-secrets/. No provider config is
    # needed at install time.
    serviceMonitor:
      enabled: false
    # Sized for Always Free ARM A1 (2 OCPU / 12GB total).
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
    webhook:
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi
    certController:
      replicaCount: 1
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ztunnel
  namespace: flux-system
spec:
  dependsOn:
    - name: istio-cni
  interval: 30m
  timeout: 10m
  releaseName: ztunnel
  targetNamespace: istio-system
  chart:
    spec:
      chart: ztunnel
      version: "1.26.x"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    # Per-node L4 mTLS proxy (DaemonSet); sized for ARM A1 nodes.
    resources:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        memory: 256Mi

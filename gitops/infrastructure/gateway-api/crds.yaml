---
# Standard channel only (GatewayClass, Gateway, HTTPRoute, GRPCRoute,
# ReferenceGrant). Experimental CRDs are intentionally excluded.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
  namespace: flux-system
spec:
  interval: 12h
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: gateway-api
  path: ./config/crd/standard

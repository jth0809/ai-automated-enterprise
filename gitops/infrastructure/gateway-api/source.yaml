---
# Gateway API standard-channel CRDs are not shipped by Istio or OKE.
# They are synced straight from the upstream tag to avoid vendoring
# thousands of lines of CRD YAML into this repo.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway-api
  namespace: flux-system
spec:
  interval: 12h
  url: https://github.com/kubernetes-sigs/gateway-api
  ref:
    tag: v1.3.0
  ignore: |
    # Only the CRD directory is needed.
    /*
    !/config/crd

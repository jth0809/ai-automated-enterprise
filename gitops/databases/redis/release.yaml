apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: redis-operator
  targetNamespace: redis
  chart:
    spec:
      chart: redis-operator
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: ot-helm
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    redisOperator:
      # Single lightweight controller pod.
      replicas: 1
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: strimzi-kafka-operator
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: strimzi-kafka-operator
  targetNamespace: kafka
  chart:
    spec:
      chart: strimzi-kafka-operator
      version: "0.46.x"
      sourceRef:
        kind: HelmRepository
        name: strimzi
        namespace: flux-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    replicas: 1
    # Watch only the kafka namespace to keep the operator's cache small.
    watchAnyNamespace: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 384Mi

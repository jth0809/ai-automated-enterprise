---
# Single dual-role (controller+broker) KRaft node: no ZooKeeper, minimal
# memory. RF=1 everywhere — acceptable blast radius on a 1-broker cluster.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: production-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 10Gi
        deleteClaim: false
  resources:
    requests:
      # Low reservation (no cpu limit -> free bursting): the 2 OCPU node
      # pool cannot fit larger requests alongside the full platform stack.
      cpu: 150m
      memory: 768Mi
    limits:
      memory: 1Gi
  jvmOptions:
    -Xms: 512m
    -Xmx: 512m
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: production-kafka
  namespace: kafka
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
spec:
  kafka:
    listeners:
      # Plaintext inside the cluster is acceptable: ztunnel (Ambient Mesh)
      # wraps all pod-to-pod traffic in mTLS at L4.
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      log.retention.hours: 72
      log.segment.bytes: 268435456
  entityOperator:
    # Topic Operator only (KafkaTopic CRs); User Operator omitted to save RAM.
    topicOperator:
      resources:
        requests:
          cpu: 20m
          memory: 128Mi
        limits:
          memory: 256Mi

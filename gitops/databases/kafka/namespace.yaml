apiVersion: v1
kind: Namespace
metadata:
  name: kafka
  labels:
    # Enroll brokers in Istio Ambient Mesh so ztunnel actually delivers
    # the L4 mTLS that the plaintext-listener comment in
    # kafka-cluster.yaml relies on. App network policies already permit
    # the HBONE port (15008) toward this namespace.
    istio.io/dataplane-mode: ambient

---
# ClusterSecretStore (OCI Vault) — needs the External Secrets CRDs and
# webhook from the infra layer before it can be applied.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: security-external-secrets
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-external-secrets
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/security/external-secrets

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- gotk-components.yaml
- gotk-sync.yaml
- notification-egress.yaml
patches:
# Nodes are CPU-request saturated (840m allocatable); the flux default of
# 100m starves OKE-managed daemonsets. Notification traffic here is tiny.
- target:
    kind: Deployment
    name: notification-controller
  patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: notification-controller
      namespace: flux-system
    spec:
      template:
        spec:
          containers:
          - name: manager
            resources:
              requests:
                cpu: 25m
- target:
    kind: NetworkPolicy
    name: allow-egress
  patch: |-
    - op: replace
      path: /spec/podSelector
      value:
        matchExpressions:
          - key: app
            operator: NotIn
            values:
              - notification-controller

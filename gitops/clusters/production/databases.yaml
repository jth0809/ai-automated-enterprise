---
# Phase 3 data plane. Operator HelmRelease and its Custom Resources live in
# the same path: the first reconcile applies the operator while the CRs fail
# on missing CRDs, then retryInterval re-applies them once CRDs exist.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: db-kafka
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-istio-ambient
  interval: 10m
  retryInterval: 2m
  timeout: 15m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/databases/kafka
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: db-redis
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-istio-ambient
  interval: 10m
  retryInterval: 2m
  timeout: 15m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/databases/redis

---
# Cluster-wide bridge to OCI Vault. ExternalSecrets in app namespaces
# reference this store by name ("oci-vault"). No credentials live in Git:
# the operator authenticates via Instance Principal of the OKE nodes.
#
# One-time OCI setup (outside GitOps):
#   1. Dynamic group matching the OKE worker instances.
#   2. Policy: "Allow dynamic-group <group> to read secret-family in
#      compartment <compartment>".
#   3. Replace the placeholder vault OCID / region below.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: oci-vault
spec:
  provider:
    oracle:
      # CHANGE_ME: OCID of the OCI Vault holding app secrets.
      vault: ocid1.vault.oc1.ap-osaka-1.fzvepnsoaafre.abvwsljrcfmaexb73udw2x2tlsnjfqiha2yjqgti5etk4gggiymhen7wkboq
      # Matches the infrastructure region in terraform.tfvars.
      region: ap-osaka-1
      principalType: InstancePrincipal

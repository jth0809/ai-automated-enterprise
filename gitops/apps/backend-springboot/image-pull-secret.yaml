---
# OCIR is a private registry: without this pull secret every pod lands in
# ImagePullBackOff. The full dockerconfigjson string is stored in OCI Vault
# under the key "ocir-dockerconfigjson" (generate with:
# kubectl create secret docker-registry --dry-run=client -o json ...
# using the OCIR auth token, then store the .dockerconfigjson value).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ocir-pull-secret
  namespace: backend
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: ocir-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfig }}"
  data:
    - secretKey: dockerconfig
      remoteRef:
        key: ocir-dockerconfigjson

---
# Pulls Kafka and ATP DB credentials from OCI Vault via the cluster-wide
# "oci-vault" ClusterSecretStore (gitops/security/external-secrets/).
# The rendered Secret is consumed by the Deployment through envFrom, so
# key names double as Spring Boot environment properties.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-springboot-secrets
  namespace: backend
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: backend-springboot-secrets
    creationPolicy: Owner
  data:
    # --- Oracle ATP (JDBC over TCPS 1522) ---
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: backend-atp-jdbc-url
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: backend-atp-username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: backend-atp-password
    # --- Kafka ---
    # The internal listener is currently unauthenticated (mTLS is provided
    # at L4 by ztunnel); these become SASL credentials once the Strimzi
    # listener enables authentication.
    - secretKey: KAFKA_SASL_USERNAME
      remoteRef:
        key: backend-kafka-username
    - secretKey: KAFKA_SASL_PASSWORD
      remoteRef:
        key: backend-kafka-password

---
# Pulls Kafka and ATP DB credentials from OCI Vault via the cluster-wide
# "oci-vault" ClusterSecretStore (gitops/security/external-secrets/).
# The rendered Secret is consumed by the Deployment through envFrom, so
# key names double as Spring Boot environment properties.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-springboot-secrets
  namespace: backend
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: backend-springboot-secrets
    creationPolicy: Owner
  data:
    # --- Oracle ATP (JDBC over TCPS 1522) ---
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: backend-atp-jdbc-url
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: backend-atp-username
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: backend-atp-password
    # NOTE: no Kafka credentials on purpose. The internal listener is
    # unauthenticated (ztunnel provides L4 mTLS), and an ExternalSecret
    # fails atomically if any referenced vault key is missing. Re-add
    # KAFKA_SASL_USERNAME/PASSWORD entries (vault keys
    # backend-kafka-username/-password) when the Strimzi listener
    # enables SASL.

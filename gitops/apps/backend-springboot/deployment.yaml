---
# Canary target. Flagger clones this into backend-springboot-primary and
# scales this Deployment to 0 between rollouts — therefore spec.replicas
# is intentionally omitted so Flux (SSA) never fights Flagger over it.
# The image tag is rewritten by the ci-backend workflow; set the real
# OCIR region/tenancy once (must match the workflow's IMAGE_REPO).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-springboot
  namespace: backend
  labels:
    app: backend-springboot
spec:
  selector:
    matchLabels:
      app: backend-springboot
  template:
    metadata:
      labels:
        app: backend-springboot
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: backend
          image: ap-osaka-1.ocir.io/axmlliealtlv/backend-springboot:a54d85c4d08c
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: production-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092
            - name: SPRING_DATA_REDIS_HOST
              value: production-redis.redis.svc.cluster.local
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0"
            # Tracker schema (Flyway V1/V2) applies on deploy; the tracker
            # itself stays dark until the PR-2 flip to "true" after the
            # schema/startup check (phase 1a rollout plan, task 17).
            - name: SPRING_FLYWAY_ENABLED
              value: "true"
            - name: TRACKER_ENABLED
              value: "false"
            - name: TRACKER_GATE_MODEL
              value: claude-haiku-4-5-20251001
            - name: TRACKER_CLASSIFY_MODEL
              value: claude-opus-4-8
            # Phase 2 live golden runs stay dark until an explicit reviewed
            # GitOps activation; offline replay and drills never set baseline.
            - name: TRACKER_GOLDEN_LIVE_ENABLED
              value: "false"
            # Phase 1b collection bounds (non-secret). The fluke filter stays
            # dark until its Anthropic contract check passes post-deploy.
            - name: TRACKER_EXTRACT_CRON
              value: "0 15 * * * *"
            - name: TRACKER_EXTRACT_BATCH_SIZE
              value: "30"
            - name: TRACKER_FLUKE_ENABLED
              value: "false"
            # Phase 3 Layer B Launch Library 2 import. Egress can ship ahead of
            # activation; live polling stays independently dark by default.
            - name: TRACKER_LL2_ENABLED
              value: "false"
            - name: TRACKER_LL2_CRON
              value: "0 17 3 8 * *"
            - name: TRACKER_LL2_MAX_PAGES
              value: "10"
            # Reviewed local orbital-population facts. This performs no live
            # fetch or model call and only writes completed-year Layer B rows.
            - name: TRACKER_HUMAN_PRESENCE_ON_BOOT
              value: "true"
            - name: TRACKER_HUMAN_PRESENCE_RESOURCE
              value: tracker/human-presence-transitions-v1.csv
            - name: TRACKER_HUMAN_PRESENCE_DATASET_VERSION
              value: human-presence-v1
            # WP3.5 bounded official HTML-index discovery. The exact ISRO/CNSA
            # hosts can ship ahead of activation; all discovered rows remain
            # evaluation-quarantined until a separate LIVE_MODEL review.
            - name: TRACKER_OFFICIAL_INDEX_ENABLED
              value: "false"
            - name: TRACKER_OFFICIAL_INDEX_CRON
              value: "0 23 4 * * WED"
            - name: TRACKER_OFFICIAL_INDEX_MAX_LINKS
              value: "40"
            # WP3.3 declared-assumption transport projection. It reuses the
            # reviewed local corpus and LL2 path; both jobs stay dark until a
            # separately reviewed GitOps activation.
            - name: TRACKER_TRANSPORT_ECONOMICS_ENABLED
              value: "false"
            - name: TRACKER_TRANSPORT_PROJECTION_CRON
              value: "0 47 3 8 * *"
            - name: TRACKER_COHERENCE_CRON
              value: "0 0 3 1 */3 *"
            - name: TRACKER_TRANSPORT_TARGET_USD_PER_KG
              value: "200"
            - name: TRACKER_TRANSPORT_TARGET_EASY_USD_PER_KG
              value: "500"
            - name: TRACKER_TRANSPORT_TARGET_HARD_USD_PER_KG
              value: "100"
            # WP3.4 Metaculus path is deployed as code-only dark launch. Both
            # authorization gates stay false and no token secret is referenced
            # until data-use approval and a Vault key are reviewed separately.
            - name: TRACKER_METACULUS_ENABLED
              value: "false"
            - name: TRACKER_METACULUS_TERMS_APPROVED
              value: "false"
            - name: TRACKER_METACULUS_CRON
              value: "0 17 5 * * MON"
            - name: TRACKER_METACULUS_MAX_POSTS
              value: "2"
            # Phase 4 credibility calculations and prediction operations ship
            # dark. Each automatic path requires a separate reviewed GitOps
            # activation after the G4 observation prerequisites are met.
            - name: TRACKER_PHASE4_PROJECTION_ENABLED
              value: "false"
            - name: TRACKER_PHASE4_BACKTEST_ENABLED
              value: "false"
            - name: TRACKER_PHASE4_PREDICTION_ISSUANCE_ENABLED
              value: "false"
            - name: TRACKER_PHASE4_PREDICTION_RESOLUTION_ENABLED
              value: "false"
          envFrom:
            - secretRef:
                name: backend-springboot-secrets
          startupProbe:
            # Liveness group only: the aggregate /actuator/health includes
            # the DB check, and a DB outage must not block pod startup
            # (the app starts with initialization-fail-timeout: -1).
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 5
            failureThreshold: 36
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
          # Sized for Always Free ARM A1 (2 OCPU / 12GB total). Low CPU
          # reservation, no CPU limit: the JVM bursts freely at startup,
          # and during canary analysis primary+canary run concurrently.
          resources:
            requests:
              cpu: 25m
              memory: 512Mi
            limits:
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
# Simple canary: +10% traffic per minute up to 50%, promoted when the
# gateway-observed success rate stays >= 99% and p99 latency <= 500ms;
# 5 failed checks roll everything back to primary. Flagger manages the
# backend-springboot HTTPRoute weights on the shared public-gateway.
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: backend-springboot
  namespace: backend
spec:
  provider: gatewayapi:v1
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-springboot
  progressDeadlineSeconds: 600
  service:
    port: 8080
    targetPort: http
    hosts:
      - api.example.com   # CHANGE_ME: keep in sync with httproute.yaml
    gatewayRefs:
      - name: public-gateway
        namespace: istio-ingress
  analysis:
    interval: 1m
    threshold: 5
    maxWeight: 50
    stepWeight: 10
    metrics:
      - name: success-rate
        templateRef:
          name: gateway-success-rate
        thresholdRange:
          min: 99
        interval: 1m
      - name: latency-p99
        templateRef:
          name: gateway-latency-p99
        thresholdRange:
          max: 500
        interval: 1m
    webhooks:
      # Synthetic traffic through the gateway so the metrics above have
      # data even when no real users are hitting the canary.
      - name: load-test
        type: rollout
        url: http://flagger-loadtester.flagger-system/
        timeout: 15s
        metadata:
          cmd: "hey -z 1m -q 5 -c 2 -host api.example.com http://public-gateway-istio.istio-ingress.svc.cluster.local/actuator/health"

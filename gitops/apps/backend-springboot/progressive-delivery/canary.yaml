---
# Simple canary: +10% traffic per minute up to 50%, promoted when the
# gateway-observed success rate stays >= 99% and p99 latency <= 500ms;
# 5 failed checks roll everything back to primary. Flagger manages the
# backend-springboot HTTPRoute weights on the shared public-gateway.
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: backend-springboot
  namespace: backend
spec:
  provider: gatewayapi:v1
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-springboot
  progressDeadlineSeconds: 600
  service:
    port: 8080
    targetPort: http
    hosts:
      - api.ai-auto.kro.kr   # keep in sync with httproute.yaml
    gatewayRefs:
      - name: public-gateway
        namespace: istio-ingress
  analysis:
    interval: 1m
    threshold: 5
    maxWeight: 50
    stepWeight: 10
    metrics:
      # interval is the rate() window in the templates, not the check
      # cadence. The gateway PodMonitor scrapes every 30s, so a 1m window
      # intermittently sees a single sample and rate() returns nothing —
      # Flagger then halts with "no values found" until the run fails.
      # 2m guarantees >=3 samples per evaluation.
      - name: success-rate
        templateRef:
          name: gateway-success-rate
        thresholdRange:
          min: 99
        interval: 2m
      - name: latency-p99
        templateRef:
          name: gateway-latency-p99
        thresholdRange:
          max: 500
        interval: 2m
    webhooks:
      # Synthetic traffic through the gateway so the metrics above have
      # data even when no real users are hitting the canary.
      - name: load-test
        type: rollout
        url: http://flagger-loadtester.flagger-system/
        timeout: 15s
        metadata:
          # Real production path (DNS -> LB -> TLS -> route): the port-80
          # in-cluster path now only answers with the HTTPS redirect, and
          # analysis should fail if the cert/LB/route chain is broken.
          # /api/status (not /actuator/*): the gateway denies /actuator
          # externally (gateway-authz.yaml), and /api/status additionally
          # exercises the ATP connectivity path at a modest 10 rps.
          cmd: "hey -z 1m -q 5 -c 2 https://api.ai-auto.kro.kr/api/status"

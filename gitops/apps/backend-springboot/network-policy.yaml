---
# Zero-Trust policy for the backend. Once this policy selects the pods,
# Cilium switches them to default-deny in both directions; every flow
# below is an explicit whitelist. Port 15008 appears next to the app
# ports because Ambient Mesh (ztunnel/gateway) tunnels in-mesh traffic
# over HBONE mTLS on 15008 while out-of-mesh flows stay on the app port.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: backend-springboot
  namespace: backend
spec:
  # Flagger rewrites the pod label on the primary it manages
  # (app=backend-springboot-primary); canary/target pods keep
  # app=backend-springboot. Select both so the primary — the pods that
  # actually serve traffic — is covered by this default-deny policy too.
  endpointSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - backend-springboot
          - backend-springboot-primary
  ingress:
    # 1) Istio Ingress Gateway (Gateway API auto-deployed pods) only.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: istio-ingress
            gateway.networking.k8s.io/gateway-name: public-gateway
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "15008"
              protocol: TCP
    # 2) Frontend nginx (/api reverse proxy). Required counterpart of the
    #    frontend policy's "egress only to backend" rule — without it the
    #    proxy path is dead on arrival under default-deny.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: frontend
            app: frontend-react
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "15008"
              protocol: TCP
  egress:
    # DNS to CoreDNS — nothing resolves without this under default-deny.
    # The L7 dns rule routes lookups through Cilium's DNS proxy, which the
    # toFQDNs rule below requires to map names to allowed IPs.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    # Kafka brokers (Strimzi) in the kafka namespace: 9092 plain listener,
    # 9093 TLS listener, 15008 in case the namespace joins the mesh later.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kafka
            strimzi.io/cluster: production-kafka
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
            - port: "9093"
              protocol: TCP
            - port: "15008"
              protocol: TCP
    # Redis cache in the redis namespace.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: redis
            app: production-redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
            - port: "15008"
              protocol: TCP
    # News feed ingestion (RSS over HTTPS). Scoped to the configured feed
    # host only — NEWS_FEEDS entries for other hosts also need a rule here,
    # or the fetch is dropped by default-deny.
    - toFQDNs:
        - matchName: news.google.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Multiplanetary tracker collection (RSS/Atom feeds + article body
    # fetches over HTTPS). This exact-host set mirrors the active
    # source_domain rows seeded by Flyway V3/V4 — a host is deployable only
    # when it exists in BOTH places. Verified by
    # tests/tracker-egress-policy.ps1; update the script with any change.
    - toFQDNs:
        - matchName: www.nasa.gov
        - matchName: science.nasa.gov
        - matchName: www.esa.int
        - matchName: global.jaxa.jp
        - matchName: rss.arxiv.org
        - matchName: arxiv.org
        - matchName: export.arxiv.org
        - matchName: spacenews.com
        - matchName: www.nasaspaceflight.com
        - matchName: spaceflightnow.com
        - matchName: www.planetary.org
        - matchName: phys.org
        - matchName: www.space.com
        - matchName: feeds.arstechnica.com
        - matchName: arstechnica.com
        - matchName: www.universetoday.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Launch Library 2 annual cadence collection (Layer B only). Exact host,
    # HTTPS only; the independent TRACKER_LL2_ENABLED flag remains false until
    # a reviewed GitOps activation after deployment validation.
    - toFQDNs:
        - matchName: ll.thespacedevs.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Anthropic Messages API (AI news summarization + tracker gate/classify).
    # Scoped to the single FQDN the AnthropicSummarizer and the tracker's
    # AnthropicClient call — without this rule the backend times out
    # reaching api.anthropic.com under default-deny.
    - toFQDNs:
        - matchName: api.anthropic.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Oracle ATP lives outside the cluster: 1521 = one-way TLS (walletless,
    # current mode), 1522 = mTLS (kept for a future wallet-based setup).
    # Shared serverless Always Free ATP (terraform: is_free_tier, no private
    # endpoint) is only reachable via the regional ADB endpoint, so scope
    # egress to that FQDN instead of the whole "world" entity.
    - toFQDNs:
        - matchName: adb.ap-osaka-1.oraclecloud.com
        - matchPattern: "*.adb.ap-osaka-1.oraclecloud.com"
      toPorts:
        - ports:
            - port: "1521"
              protocol: TCP
            - port: "1522"
              protocol: TCP

---
# External route for the web app, attached to the shared Istio gateway.
# No canary here, so Flux fully owns this route.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-react
  namespace: frontend
spec:
  parentRefs:
    - name: public-gateway
      namespace: istio-ingress
  hostnames:
    - 64.110.118.19.nip.io
  rules:
    - backendRefs:
        - name: frontend-react
          port: 80

---
# Zero-Trust policy for the frontend: ingress only from the Istio
# Ingress Gateway, egress only to DNS and the backend service (nginx
# /api reverse proxy). Port 15008 accompanies the app ports because
# Ambient Mesh tunnels in-mesh traffic over HBONE mTLS on 15008.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: frontend-react
  namespace: frontend
spec:
  endpointSelector:
    matchLabels:
      app: frontend-react
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: istio-ingress
            gateway.networking.k8s.io/gateway-name: public-gateway
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "15008"
              protocol: TCP
  egress:
    # DNS to CoreDNS — nothing resolves without this under default-deny.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Backend API only. Flagger rewrites the pod label on the primary it
    # manages (app=backend-springboot-primary); canary/target pods keep
    # app=backend-springboot — match both or the nginx /api proxy is
    # dropped at egress once Flagger owns the workload.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: backend
          matchExpressions:
            - key: app
              operator: In
              values:
                - backend-springboot
                - backend-springboot-primary
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "15008"
              protocol: TCP

---
# OCIR is a private registry: without this pull secret every pod lands in
# ImagePullBackOff. Same OCI Vault key ("ocir-dockerconfigjson") as the
# backend copy — ExternalSecrets are namespaced, so each app namespace
# materializes its own Secret from the shared vault entry.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ocir-pull-secret
  namespace: frontend
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: oci-vault
  target:
    name: ocir-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfig }}"
  data:
    - secretKey: dockerconfig
      remoteRef:
        key: ocir-dockerconfigjson

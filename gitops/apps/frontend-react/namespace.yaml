apiVersion: v1
kind: Namespace
metadata:
  name: frontend
  labels:
    # Enroll every pod in this namespace into Istio Ambient Mesh:
    # ztunnel wraps all pod-to-pod traffic in mTLS (HBONE, port 15008).
    istio.io/dataplane-mode: ambient
    # Grants HTTPRoutes in this namespace permission to attach to the
    # shared public-gateway (allowedRoutes namespace selector).
    shared-gateway-access: "true"
